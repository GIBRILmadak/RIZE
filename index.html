<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIZE | Tracez votre progression</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Web icon and branding -->
    <link rel="icon" type="image/svg+xml" href="icons/logo.png">
    <link rel="shortcut icon" href="icons/logo.png">
    <meta name="theme-color" content="#050505">
    <meta name="description" content="RIZE - Plateforme de suivi de progression transparente sans dopamine sociale">
    <style>
        /* --- SYSTÈME DE DESIGN PREMIUM --- */
        :root {
            --bg-color: #050505;
            --surface-color: #121212;
            --surface-hover: #1a1a1a;
            --accent-color: #ffffff;
            --text-primary: #f5f5f5;
            --text-secondary: #888888;
            --border-color: #222222;
            --success: #10b981;
            --failure: #ef4444;
            --pause: #6366f1;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --modal-overlay: rgba(0, 0, 0, 0.7);
        }

        /* Mode clair */
        html.light-mode {
            --bg-color: #ffffff;
            --surface-color: #f5f5f5;
            --surface-hover: #efefef;
            --accent-color: #000000;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --border-color: #dddddd;
            --modal-overlay: rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: -1.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo-img {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: var(--transition);
            cursor: pointer;
        }

        .nav-links a:hover { color: var(--text-primary); }

        /* --- PAGES --- */
        .page {
            display: none;
            min-height: 100vh;
            padding-top: 100px;
            animation: pageEnter 0.6s ease;
        }

        .page.active { display: block; }

        @keyframes pageEnter {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem 5rem;
        }

        /* --- LANDING PAGE --- */
        #landing .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .landing-logo {
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
            animation: float 3s ease-in-out infinite;
        }

        .landing-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        #landing h1 {
            margin-top: 1rem;
        }

        /* --- GRILLE DISCOVER (TRAJECTOIRES) --- */
        .discover-header {
            text-align: left;
            margin-bottom: 3rem;
        }

        .discover-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Mobile: 2 par ligne */
            gap: 1.5rem;
        }

        @media (min-width: 1024px) {
            .discover-grid { grid-template-columns: repeat(4, 1fr); } /* Desktop: 4 par ligne */
        }

        .user-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .user-card:hover {
            border-color: #444;
            transform: scale(1.02);
            background: var(--surface-hover);
        }

        .card-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: cover;
            background: #222;
            cursor: pointer;
        }

        .card-meta h3 { 
            font-size: 1rem; 
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-primary);
        }

        .card-meta h3:hover {
            color: var(--accent-color);
            text-decoration: underline;
        }

        .card-meta span { font-size: 0.75rem; color: var(--text-secondary); display: block; }

        .card-status {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 0.8rem;
            border-radius: 10px;
            font-size: 0.85rem;
        }

        .status-day {
            font-weight: 700;
            color: var(--accent-color);
            margin-right: 5px;
        }

        /* --- MODE IMMERSIF (TYPE TIKTOK / PROGRESSION) --- */
        #immersive-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            display: none;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }

        .immersive-post {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .post-content-wrap {
            width: 100%;
            max-width: 500px;
            height: 85vh;
            background: #111;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid #333;
        }

        .post-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 2rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        .step-indicator {
            background: var(--accent-color);
            color: #000;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: inline-block;
        }

        .state-tag {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-left: 10px;
        }

        /* --- PAGE PROFIL (TIMELINE) --- */
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            padding-left: 2rem;
            padding-right: 2rem;
        }

        .profile-hero {
            text-align: center;
            margin-bottom: 4rem;
        }

        .profile-banner {
            width: 100%;
            height: 300px;
            border-radius: 16px;
            margin-bottom: -60px;
            object-fit: cover;
            border: 1px solid var(--border-color);
        }

        .profile-avatar-wrapper {
            position: relative;
            z-index: 10;
            display: inline-block;
            margin-bottom: 2rem;
        }

        .profile-avatar-img {
            width: 120px;
            height: 120px;
            border-radius: 25px;
            border: 4px solid var(--bg-color);
            object-fit: cover;
            background: #222;
        }

        .timeline {
            position: relative;
            padding-left: 40px;
        }

        .timeline::before {
            content: "";
            position: absolute;
            left: 15px;
            top: 0;
            bottom: 0;
            width: 1px;
            background: var(--border-color);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 4rem;
        }

        .timeline-dot {
            position: absolute;
            left: -32.5px;
            top: 5px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--surface-color);
            border: 2px solid var(--border-color);
            z-index: 2;
        }

        .item-success .timeline-dot { border-color: var(--success); background: var(--success); }
        .item-failure .timeline-dot { border-color: var(--failure); background: var(--failure); }
        .item-empty .timeline-dot { border-color: #333; background: transparent; }

        .timeline-date {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .timeline-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .timeline-card h4 { margin-bottom: 0.5rem; }
        .timeline-card p { color: var(--text-secondary); font-size: 0.95rem; }

        .empty-indicator {
            font-style: italic;
            color: #444;
            font-size: 0.9rem;
        }

        /* --- TIMELINE COLLAPSIBLE --- */
        .timeline-latest {
            position: relative;
        }

        .timeline-item-latest {
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
            padding: 1.5rem;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .timeline-item-latest .timeline-dot-badge {
            flex-shrink: 0;
        }

        .timeline-item-latest .timeline-date {
            font-size: 0.7rem;
            margin-bottom: 0.3rem;
        }

        .timeline-item-latest .timeline-card {
            background: transparent;
            border: none;
            padding: 0;
        }

        .timeline-item-latest .timeline-card h4 {
            margin-bottom: 0.3rem;
            font-size: 1rem;
        }

        .timeline-item-latest .timeline-card p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .btn-toggle-timeline {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: var(--font-body);
            font-size: 0.9rem;
        }

        .btn-toggle-timeline:hover {
            background: var(--border-color);
            transform: translateY(-2px);
        }

        .btn-toggle-timeline svg {
            width: 18px;
            height: 18px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-toggle-timeline.expanded svg {
            transform: rotate(180deg);
        }

        .timeline-full {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 1.5rem;
            padding: 1.5rem;
            padding-left: 3.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            max-height: 600px;
            overflow-y: auto;
            animation: slideDown 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .timeline-full.hidden {
            display: none;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                max-height: 0;
                overflow: hidden;
            }
            to {
                opacity: 1;
                max-height: 600px;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 1;
                max-height: 600px;
            }
            to {
                opacity: 0;
                max-height: 0;
                overflow: hidden;
            }
        }

        /* --- BOUTONS --- */
        .btn {
            padding: 0.7rem 1.4rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .btn-primary { background: #fff; color: #000; }
        .btn-primary:hover { opacity: 0.9; }

        .close-immersive {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 3000;
            background: rgba(255,255,255,0.1);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* --- BADGES SYSTÈME --- */
        .badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: var(--transition);
            white-space: nowrap;
        }

        .badge:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
        }

        .badge-icon {
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .badge-icon svg {
            width: 100%;
            height: 100%;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .badge-filled svg {
            fill: currentColor;
            stroke: none;
        }

        .badge-success { color: var(--success); }
        .badge-failure { color: var(--failure); }
        .badge-pause { color: var(--pause); }

        .timeline-dot-badge {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-color);
            border: 2px solid var(--border-color);
            position: absolute;
            left: -33px;
            top: 0;
            z-index: 2;
        }

        .timeline-dot-badge svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .timeline-dot-badge.filled svg {
            fill: currentColor;
            stroke: none;
        }

        .item-success .timeline-dot-badge {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .item-failure .timeline-dot-badge {
            border-color: var(--failure);
            background: rgba(239, 68, 68, 0.1);
            color: var(--failure);
        }

        .item-pause .timeline-dot-badge {
            border-color: var(--pause);
            background: rgba(99, 102, 241, 0.1);
            color: var(--pause);
        }

        .item-empty .timeline-dot-badge {
            border-color: #333;
            background: transparent;
            color: #333;
        }

        .badges-immersive {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* --- PROFIL - ICÔNES SOCIALES --- */
        .profile-social-links {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: center;
        }

        .profile-social-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            opacity: 0.6;
            transition: var(--transition);
            color: var(--text-primary);
        }

        .profile-social-icon:hover {
            opacity: 1;
        }

        .profile-social-icon img,
        .profile-social-icon svg {
            width: 100%;
            height: 100%;
            stroke: currentColor;
            fill: currentColor;
        }

        /* --- BADGES RÉSEAUX SOCIAUX --- */
        .profile-social-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1.5rem;
            justify-content: center;
        }

        .social-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1rem;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-decoration: none;
            transition: var(--transition);
            color: var(--text-primary);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .social-badge:hover {
            background: var(--surface-hover);
            border-color: var(--text-secondary);
            transform: translateY(-2px);
        }

        .social-badge-icon {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- INTERFACE RÉGLAGES (MODALE PREMIUM) --- */
        :root {
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        #settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2500;
            display: none;
            overflow-y: auto;
            padding: 2rem 1.5rem;
            padding-top: 5rem;
        }

        #settings-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            animation: fadeInSettings 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInSettings {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .settings-header {
            margin-bottom: 3rem;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 2rem;
        }

        .settings-header h2 {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 0.75rem;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .settings-header p {
            color: #666;
            font-size: 1rem;
            font-weight: 400;
        }

        .settings-section {
            background: #0c0c0c;
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .settings-section h3 {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.75rem;
            color: #f5f5f5;
            letter-spacing: -0.02em;
        }

        .settings-section p {
            color: #444;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 1.75rem;
        }

        .form-group label {
            display: block;
            font-family: var(--font-heading);
            font-size: 0.75rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .form-input {
            width: 100%;
            background: #050505;
            border: 1px solid #222;
            border-radius: 10px;
            padding: 0.9rem 1.1rem;
            color: #fff;
            font-family: var(--font-body);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: #444;
            background: #080808;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.03);
        }

        .form-hint {
            font-size: 0.8rem;
            color: #444;
            margin-top: 0.6rem;
            font-weight: 400;
        }

        .upload-zone {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .preview-avatar-circle {
            width: 110px;
            height: 110px;
            border-radius: 28px;
            object-fit: cover;
            background: #1a1a1a;
            border: 2px solid #222;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .preview-avatar-circle:hover {
            transform: scale(1.05);
        }

        .preview-banner-rect {
            width: 100%;
            height: 160px;
            border-radius: 14px;
            object-fit: cover;
            background: #1a1a1a;
            border: 1px solid #222;
            margin-bottom: 1.25rem;
            cursor: pointer;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 0.7rem 1.4rem;
            cursor: pointer;
            background: #151515;
            border: 1px solid #222;
            border-radius: 8px;
            font-family: var(--font-heading);
            font-size: 0.85rem;
            font-weight: 600;
            color: #ccc;
            transition: all 0.2s ease;
        }

        .custom-file-upload:hover {
            background: #1a1a1a;
            color: #fff;
            border-color: #333;
        }

        .social-link-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 1.25rem;
            background: #080808;
            padding: 0.4rem 0.6rem;
            border-radius: 12px;
            border: 1px solid #1a1a1a;
            transition: border-color 0.3s ease;
        }

        .social-link-item:focus-within {
            border-color: #333;
        }

        .social-link-item img {
            width: 22px;
            height: 22px;
            opacity: 0.5;
            margin-left: 0.5rem;
        }

        .social-link-item .form-input {
            border: none;
            padding: 0.6rem;
            background: transparent;

        // Récupérer l'utilisateur
        function getUser(userId) {
            return mockUsers.find(u => u.userId === userId);
        }

        /* ========================================
           SYSTÈME DE FOLLOWERS
           ======================================== */

        // Vérifier si l'utilisateur suit quelqu'un
        function isFollowing(fromUserId, toUserId) {
            const user = getUser(fromUserId);
            return user && user.following.includes(toUserId);
        }

        // Ajouter un follower
        function followUser(fromUserId, toUserId) {
            const userFrom = getUser(fromUserId);
            const userTo = getUser(toUserId);
            
            if (!userFrom || !userTo) return;
            
            // Ajouter à following de l'utilisateur courant
            if (!userFrom.following.includes(toUserId)) {
                userFrom.following.push(toUserId);
            }
            
            // Ajouter à followers de l'utilisateur suivi
            if (!userTo.followers.includes(fromUserId)) {
                userTo.followers.push(fromUserId);
            }
        }

        // Retirer un follower
        function unfollowUser(fromUserId, toUserId) {
            const userFrom = getUser(fromUserId);
            const userTo = getUser(toUserId);
            
            if (!userFrom || !userTo) return;
            
            userFrom.following = userFrom.following.filter(id => id !== toUserId);
            userTo.followers = userTo.followers.filter(id => id !== fromUserId);
        }

        // Compter les followers
        function getFollowerCount(userId) {
            const user = getUser(userId);
            return user ? user.followers.length : 0;
        }

        // Compter les following
        function getFollowingCount(userId) {
            const user = getUser(userId);
            return user ? user.following.length : 0;
        }

            const user = getUser(userId);
            if (!user) return;
            
            userEditData[userId] = {
                name: user.name,
                title: user.title,
                bio: user.bio || '',
                avatar: user.avatar,
                banner: user.banner,
                socialLinks: JSON.parse(JSON.stringify(user.socialLinks || {}))
            };
        }

        function saveUserChanges(userId) {
            const user = getUser(userId);
            const editData = userEditData[userId];
            
            if (!user || !editData) return false;
            
            // Validation: nom unique
            const nameExists = mockUsers.some(u => 
                u.userId !== userId && u.name.toLowerCase() === editData.name.toLowerCase()
            );
            
            if (nameExists) {
                alert('Ce nom d\'utilisateur est déjà pris.');
                return false;
            }
            
            // Appliquer les changements

            user.title = editData.title;
            user.bio = editData.bio;
            user.avatar = editData.avatar;
            user.banner = editData.banner;
            user.socialLinks = editData.socialLinks;
            
            return true;
        }

                .sort((a, b) => b.dayNumber - a.dayNumber);
        }

            const contents = getUserContent(userId);
            return contents.length > 0 ? contents[0] : null;
        }

            const contents = getUserContent(userId);
            if (contents.length === 0) return 'empty';
            
            const lastContent = contents[0];
            return lastContent.state;
        }

            const contents = getUserContent(userId);
            const maxDay = contents.length > 0 ? contents[0].dayNumber : 0;
            
            const timeline = [];
            for (let day = maxDay; day >= 1; day--) {
                const dayContent = contents.find(c => c.dayNumber === day);
                timeline.push({
                    dayNumber: day,
                    content: dayContent || null,
                    state: dayContent ? dayContent.state : 'empty'
                });

            transparent: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>'
        };

        // Calculer la constance (jours consécutifs)
        function calculateConsistency(userId) {
            const contents = getUserContent(userId);
            if (contents.length < 7) return null;

            // Trier par jour croissant
            const sortedByDay = [...contents].sort((a, b) => a.dayNumber - b.dayNumber);
            
            let consecutiveDays = 1;
            let maxConsecutive = 1;

            for (let i = 1; i < sortedByDay.length; i++) {
                if (sortedByDay[i].dayNumber - sortedByDay[i-1].dayNumber === 1) {
                    consecutiveDays++;
                    maxConsecutive = Math.max(maxConsecutive, consecutiveDays);
                } else {
                    consecutiveDays = 1;
                }
            }

            if (maxConsecutive >= 365) return 'consistency365';
            if (maxConsecutive >= 100) return 'consistency100';
            if (maxConsecutive >= 30) return 'consistency30';
            if (maxConsecutive >= 7) return 'consistency7';
            return null;
        }

        // Déterminer le type de trajectoire
        function determineTrajectoryType(userId) {
            const user = getUser(userId);
            const contents = getUserContent(userId);
            
            if (contents.length === 0) return null;

            // Heuristique basée sur le titre/description/métadonnées
            const userTitle = user.title.toLowerCase();
            const userProjectIds = [...new Set(contents.map(c => c.projectId))].join('');
            const textContent = (contents.map(c => (c.title + ' ' + c.description).toLowerCase()).join(' ') + ' ' + userTitle).toLowerCase();
            
            // Check pour type de trajectoire
            if (textContent.includes('unreal') || userTitle.includes('designer') || textContent.includes('motion')) return 'creative';
            if (textContent.includes('boss') || textContent.includes('game') || textContent.includes('indie')) return 'creative';
            if (textContent.includes('rize') && userTitle.includes('ceo')) return 'enterprise';
            if (textContent.includes('refonte') || textContent.includes('ui') || textContent.includes('mobile')) return 'tech';
            if (textContent.includes('architecture') || textContent.includes('api') || textContent.includes('database')) return 'tech';
            
            return 'solo';
        }

        // Évaluer la transparence (échecs documentés)
        function evaluateTransparency(userId) {
            const contents = getUserContent(userId);
            if (contents.length === 0) return false;
            
            // Transparence = au moins 30% d'échecs documentés
            const failureCount = contents.filter(c => c.state === 'failure').length;
            const ratio = failureCount / contents.length;
            
            return ratio >= 0.3;
        }

        // Générer le badge SVG avec étiquette
        function generateBadge(badgeType, label) {
            const svg = badgeSVGs[badgeType];
            if (!svg) return '';
            
            let cssClass = 'badge';
            if (badgeType.startsWith('consistency')) cssClass += '';
            else if (badgeType === 'success') cssClass += ' badge-success badge-filled';
            else if (badgeType === 'failure') cssClass += ' badge-failure badge-filled';
            else if (badgeType === 'pause') cssClass += ' badge-pause badge-filled';
            else if (badgeType === 'empty') cssClass += '';
            else if (badgeType === 'transparent') cssClass += ' badge-success';
            else cssClass += '';

            return `
                <div class="${cssClass}" title="${label}">
                    <div class="badge-icon">${svg}</div>
                    <span>${label}</span>
                </div>
            `;
        }

        // Récupérer tous les badges pour un utilisateur
        function getUserBadges(userId) {
            const badges = [];
            const user = getUser(userId);
            
            // Badge type de trajectoire
            const trajectoryType = determineTrajectoryType(userId);
            if (trajectoryType && trajectoryType !== 'solo') {
                const labels = {
                    team: 'Collectif',
                    enterprise: 'Entreprise',
                    creative: 'Créatif',
                    tech: 'Tech'
                };
                badges.push({ type: trajectoryType, label: labels[trajectoryType] });
            }

            // Badge constance
            const consistency = calculateConsistency(userId);
            if (consistency) {
                const labels = {
                    consistency7: '7j consécutifs',
                    consistency30: '30j consécutifs',
                    consistency100: '100j consécutifs',
                    consistency365: '365j consécutifs'
                };
                badges.push({ type: consistency, label: labels[consistency] });
            }

            // Badge transparence
            if (evaluateTransparency(userId)) {
                badges.push({ type: 'transparent', label: 'Transparent' });
            }

            return badges;
        }

        // Récupérer les badges pour un contenu spécifique
        function getContentBadges(content) {
            const badges = [];
            
            const stateLabels = {
                success: 'Victoire',
                failure: 'Bloqué',
                pause: 'Pause',
                empty: 'Vide'
            };

            badges.push({ type: content.state, label: stateLabels[content.state] });
            
            return badges;
        }

        // Générer HTML pour afficher les badges
        function renderBadges(badgesList) {
            if (badgesList.length === 0) return '';
            
            return `

                    </div>
                    <h2>${isOwnProfile ? 'Ma Trajectoire' : user.name}</h2>
                    <p style="color: var(--text-secondary);">En train de bâtir <strong>${user.title}</strong></p>
                    ${userBadgesHtml}
                    ${renderProfileSocialLinks(userId)}
                    
                    ${!isOwnProfile ? `
                        <div class="follow-section">
                            <div class="follower-stat">
                                <div class="follower-stat-count">${followerCount}</div>
                                <div class="follower-stat-label">Abonnés</div>
                            </div>
                            <div class="follower-stat">
                                <div class="follower-stat-count">${followingCount}</div>
                                <div class="follower-stat-label">Abonnements</div>
                            </div>
                        </div>
                        ${followButtonHtml}
                    ` : `
                        <div class="follow-section">
                            <div class="follower-stat">
                                <div class="follower-stat-count">${followerCount}</div>
                                <div class="follower-stat-label">Abonnés</div>
                            </div>
                            <div class="follower-stat">
                                <div class="follower-stat-count">${followingCount}</div>
                                <div class="follower-stat-label">Abonnements</div>
                            </div>
                        </div>
                    `}
                </div>
                <div class="timeline">
                    ${timelinesHtml}
                </div>
            `;
            
            // Injecter le bouton Réglages dans un conteneur séparé
            const settingsButtonContainer = document.getElementById('settings-button-container');
            if (settingsButtonContainer) {
                settingsButtonContainer.innerHTML = settingsButtonHtml;
            }
        }

        /* ========================================
           TOGGLE TIMELINE - Afficher/Masquer l'historique
           ======================================== */
        
        function toggleTimelineExpand(button) {
            const timelineLatest = button.closest('.timeline-latest');
            const timelineFull = timelineLatest.querySelector('.timeline-full');
            const toggleText = button.querySelector('.toggle-text');
            const isExpanded = !timelineFull.classList.contains('hidden');
            
            if (isExpanded) {
                timelineFull.classList.add('hidden');
                toggleText.textContent = 'Afficher l\'historique complet';
                button.classList.remove('expanded');
            } else {
                timelineFull.classList.remove('hidden');
                toggleText.textContent = 'Masquer l\'historique';
                button.classList.add('expanded');
            }
        }

        /* ========================================
           SYSTÈME DE THÈME (CLAIR/SOMBRE)
           ======================================== */

        // Initialiser le thème depuis le localStorage
        function initTheme() {
            const savedTheme = localStorage.getItem('rize-theme');
            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-mode');
            }
        }

        // Toggle thème
        function toggleTheme() {
            const htmlElement = document.documentElement;
            htmlElement.classList.toggle('light-mode');
            
            // Sauvegarder la préférence
            if (htmlElement.classList.contains('light-mode')) {
                localStorage.setItem('rize-theme', 'light');
            } else {
                localStorage.setItem('rize-theme', 'dark');
            }
        }

        // Obtenir l'état du thème
        function isLightMode() {
            return document.documentElement.classList.contains('light-mode');
        }

        /* ========================================
           COUCHE NAVIGATION
           ======================================== */

        let currentUserId = 'user-1'; // User par défaut pour le profil
        let currentViewerId = 'user-1'; // Utilisateur qui regarde le profil

        function navigateTo(pageId) {
            const pages = document.querySelectorAll('.page');
            pages.forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function navigateToUserProfile(userId) {
            currentUserId = userId;
            const profileContainer = document.querySelector('.profile-container');
            profileContainer.innerHTML = renderProfileTimeline(userId, currentViewerId);
            navigateTo('profile');
        }

        function toggleFollow(viewerId, targetUserId) {
            if (isFollowing(viewerId, targetUserId)) {
                unfollowUser(viewerId, targetUserId);
            } else {
                followUser(viewerId, targetUserId);
            }
            
            // Refresh du bouton
            const btn = document.getElementById(`follow-btn-${targetUserId}`);
            if (btn) {
                const isNowFollowing = isFollowing(viewerId, targetUserId);
                btn.classList.toggle('unfollow', isNowFollowing);
                btn.textContent = isNowFollowing ? '✓ Abonné' : '+ Suivre';
            }
            
            // Mettre à jour les compteurs
            const userCard = document.querySelector(`.profile-hero`);
            if (userCard) {
                const followerCount = getFollowerCount(targetUserId);
                const followerStats = userCard.querySelectorAll('.follower-stat-count');
                if (followerStats[0]) {
                    followerStats[0].textContent = followerCount;
                }
            }
        }

        function openImmersive(userId) {
            currentUserId = userId;
            const overlay = document.getElementById('immersive-overlay');
            overlay.innerHTML = `
                <div class="close-immersive" onclick="closeImmersive()">✕</div>
                ${renderImmersiveContent(userId)}
            `;
            overlay.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeImmersive() {
            document.getElementById('immersive-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        /* ========================================
           INITIALISATION
           ======================================== */

        document.addEventListener('DOMContentLoaded', function() {
            // Initialiser le thème
            initTheme();

            // Remplir la grille Discover
            const grid = document.querySelector('.discover-grid');
            grid.innerHTML = mockUsers
                .map(user => renderUserCard(user.userId))
                .join('');

            // Remplir la section profil
            const profileContainer = document.querySelector('.profile-container');
            profileContainer.innerHTML = renderProfileTimeline('user-1');
        });
    </script>
</body>
</html>
