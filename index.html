<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIZE | Tracez votre progression</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Web icon and branding -->
    <link rel="icon" type="image/svg+xml" href="icons/logo.png">
    <link rel="shortcut icon" href="icons/logo.png">
    <meta name="theme-color" content="#050505">
    <meta name="description" content="RIZE - Plateforme de suivi de progression transparente sans dopamine sociale">
    <!-- Styles globaux -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Overlay Immersif -->
    <div id="immersive-overlay">
        <!-- Contenu injecté dynamiquement -->
    </div>

    <!-- Modale Réglages -->
    <div id="settings-modal">
        <div class="settings-container">
            <!-- Contenu injecté dynamiquement -->
        </div>
    </div>

    <nav>
        <a class="logo" onclick="navigateTo('landing')" style="cursor: pointer;">
            <div class="logo-img">
                <img src="icons/logo.png" alt="RIZE - Logo" />
            </div>
            <span>RIZE</span>
        </a>
        <div class="nav-links">
            <a onclick="navigateTo('discover')">Découvrir</a>
            <a onclick="navigateTo('profile')">Ma Trajectoire</a>
        </div>
    </nav>

    <!-- LANDING -->
    <section id="landing" class="page active">
        <div class="container" style="padding-top: 0;">
            <div class="landing-logo">
                <img src="icons/logo.png" alt="RIZE - Logo officiel" />
            </div>
            <h1 style="font-size: 4rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 1rem;">Documentez l'effort.</h1>
            <p style="color: var(--text-secondary); max-width: 500px; margin: 0 auto 2.5rem;">Pas de filtres, pas de buzz. Juste des humains qui construisent quelque chose, jour après jour.</p>
            <button class="btn btn-primary" onclick="navigateTo('discover')">Voir les trajectoires</button>
        </div>
    </section>

    <!-- DISCOVER -->
    <section id="discover" class="page">
        <div class="container">
            <div class="discover-header">
                <h2>En mouvement</h2>
                <p style="color: var(--text-secondary);">Cliquez pour plonger dans une trajectoire.</p>
            </div>

            <div class="discover-grid">
                <!-- Contenu injecté dynamiquement -->
            </div>
        </div>
    </section>

    <!-- BOUTON RÉGLAGES (FIXED POSITION) -->
    <div id="settings-button-container"></div>

    <!-- PROFIL (TIMELINE) -->
    <section id="profile" class="page">
        <div class="container profile-container">
            <!-- Contenu injecté dynamiquement -->
        </div>
    </section>

    <!-- Script principal avec toute la logique -->
    <script src="js/app.js"></script>
</body>
</html>
